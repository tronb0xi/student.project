{% extends 'base.html' %}
{% block title %}Звіти{% endblock %}
{% block content %}

<h1>Звіти</h1>

<div class="card">
    <h3>Розклад вчителя</h3>
    <form method="GET" action="/api/reports/teacher-schedule/">
        <label>Вчитель ID:</label>
        <input type="number" name="teacher_id" placeholder="ID вчителя">
        <label>З:</label>
        <input type="date" name="date_from">
        <label>По:</label>
        <input type="date" name="date_to">
        <button type="submit" class="btn btn-blue">Переглянути</button>
    </form>
</div>

<div class="card">
    <h3>Відвідуваність студента</h3>
    <form method="GET" action="/api/reports/attendance-history/">
        <label>Студент ID:</label>
        <input type="number" name="student_id" placeholder="ID студента" required>
        <label>Предмет ID:</label>
        <input type="number" name="subject_id" placeholder="необов'язково">
        <label>З:</label>
        <input type="date" name="date_from">
        <label>По:</label>
        <input type="date" name="date_to">
        <button type="submit" class="btn btn-blue">Переглянути</button>
    </form>
</div>

<div class="card">
    <h3>Статистика філії</h3>
    <form method="GET" action="/api/reports/branch-statistics/">
        <label>Філія ID:</label>
        <input type="number" name="branch_id" placeholder="ID філії" required>
        <label>З:</label>
        <input type="date" name="date_from">
        <label>По:</label>
        <input type="date" name="date_to">
        <button type="submit" class="btn btn-blue">Переглянути</button>
    </form>
</div>

{% endblock %}
