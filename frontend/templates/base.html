<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}EduCenter{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; }
        .top-nav { background: #333; padding: 15px 40px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .top-nav a { color: #ddd; text-decoration: none; margin-right: 20px; font-weight: bold; }
        .top-nav a:hover { color: white; }
        .main-content { padding: 40px; }
        h1, h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-red { background-color: #dc3545; color: white; }
        .card { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin: 4px; }
        .alert-success { background-color: #d4edda; color: #155724; padding: 12px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #c3e6cb; }
        .alert-error { background-color: #f8d7da; color: #721c24; padding: 12px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #f5c6cb; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-sched { background-color: #ffc107; color: #212529; }
        .badge-comp { background-color: #28a745; color: white; }
        .badge-canc { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
<div class="top-nav">
    <div>
        <a href="/teacher/">Головна</a>
        <a href="/teacher/lessons/">Уроки</a>
        <a href="/teacher/reports/">Звіти</a>
        <a href="/admin/">Адмін</a>
    </div>
    <form action="/logout/" method="post">
        {% csrf_token %}
        <button type="submit" style="background:none;border:none;color:#ff4444;cursor:pointer;font-weight:bold;">Вийти</button>
    </form>
</div>
<div class="main-content">
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
